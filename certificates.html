    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #141b2b);
            color: #f0f4fa;
            line-height: 1.6;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Headers */
        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .section-header p {
            color: #94a3b8;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* Grid Layout */
        .cert-grid, .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        /* Card Base */
        .cert-card, .project-card {
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 1.8rem;
            padding: 1.8rem 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .cert-card::before, .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6, #8b5cf6);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .cert-card:hover::before, .project-card:hover::before {
            transform: translateX(100%);
        }

        .cert-card:hover, .project-card:hover {
            transform: translateY(-6px);
            border-color: #8b5cf6;
            box-shadow: 0 25px 40px -12px rgba(139, 92, 246, 0.4);
        }

        /* Certificate Card Content */
        .cert-icon {
            font-size: 2.5rem;
            color: #8b5cf6;
            margin-bottom: 1.2rem;
        }

        .cert-title {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: white;
        }

        .cert-issuer {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            color: #cbd5e1;
            margin-bottom: 0.75rem;
        }

        .cert-issuer i {
            color: #8b5cf6;
            font-size: 0.9rem;
        }

        .cert-date {
            display: inline-block;
            background: rgba(139, 92, 246, 0.15);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #a78bfa;
            margin-bottom: 1.5rem;
        }

        .cert-link {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.2rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .cert-link:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.4);
        }

        /* Project Card */
        .project-icon {
            font-size: 2.2rem;
            color: #60a5fa;
            margin-bottom: 1rem;
        }

        .project-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .project-desc {
            color: #b9c7da;
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tech-tag {
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.3);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #93c5fd;
        }

        .project-links a {
            color: #cbd5e1;
            margin-right: 1.2rem;
            font-size: 0.95rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .project-links a:hover {
            color: #8b5cf6;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .section-header h2 { font-size: 2.2rem; }
            .cert-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
