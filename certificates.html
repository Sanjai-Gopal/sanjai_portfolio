<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjai Gopal · Advanced Certificates & Projects Gallery</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Swiper JS for Carousels -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <!-- AOS (Animate on Scroll) -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f35 50%, #0f172a 100%);
            color: #f0f4fa;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 40% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
            animation: gradientShift 20s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle var(--duration) ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(calc(var(--x) * 20px), calc(var(--y) * -30px)) scale(1.5);
                opacity: 0.8;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        /* Section Headers with 3D Effect */
        .section-header {
            text-align: center;
            margin-bottom: 4rem;
            position: relative;
            perspective: 1000px;
        }

        .section-header h2 {
            font-size: 4rem;
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #fff, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
            transform: translateZ(20px);
            text-shadow: 
                0 10px 20px rgba(139, 92, 246, 0.3),
                0 20px 40px rgba(0, 0, 0, 0.3);
            animation: floatText 3s ease-in-out infinite;
        }

        @keyframes floatText {
            0%, 100% { transform: translateZ(20px) translateY(0); }
            50% { transform: translateZ(30px) translateY(-10px); }
        }

        .section-header p {
            color: #94a3b8;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            padding: 0.5rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .section-header p i {
            margin: 0 0.5rem;
            color: #8b5cf6;
        }

        /* Stats Counter */
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 1.5rem 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
            min-width: 180px;
        }

        .stat-item:hover {
            transform: translateY(-10px);
            border-color: #8b5cf6;
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.3);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            line-height: 1;
        }

        .stat-label {
            color: #cbd5e1;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Filter Buttons */
        .filter-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .filter-btn {
            padding: 0.8rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            color: #cbd5e1;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .filter-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4);
        }

        /* Certificates Grid - Masonry Style */
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        /* Certificate Card - Image Based */
        .cert-card {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 1/1.4;
            cursor: pointer;
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .cert-card:hover {
            transform: translateY(-15px) rotateX(5deg);
            box-shadow: 0 30px 60px rgba(139, 92, 246, 0.4);
        }

        .cert-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .cert-card:hover .cert-image {
            transform: scale(1.1);
        }

        /* Certificate Overlay with Details */
        .cert-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.95) 0%,
                rgba(139, 92, 246, 0.8) 50%,
                rgba(0, 0, 0, 0.9) 100%
            );
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem;
            opacity: 0;
            transition: opacity 0.4s ease;
            color: white;
        }

        .cert-card:hover .cert-overlay {
            opacity: 1;
        }

        .cert-icon {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .cert-card:hover .cert-icon {
            color: white;
            transform: scale(1.2) rotate(360deg);
        }

        .cert-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease 0.1s;
        }

        .cert-card:hover .cert-title {
            transform: translateY(0);
            opacity: 1;
        }

        .cert-issuer {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease 0.2s;
        }

        .cert-card:hover .cert-issuer {
            transform: translateY(0);
            opacity: 1;
        }

        .cert-date {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease 0.3s;
        }

        .cert-card:hover .cert-date {
            transform: translateY(0);
            opacity: 1;
        }

        .cert-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease 0.4s;
            border: none;
            cursor: pointer;
            width: fit-content;
        }

        .cert-card:hover .cert-link {
            transform: translateY(0);
            opacity: 1;
        }

        .cert-link:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* Certificate Badge (for issuer logo) */
        .cert-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #8b5cf6;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 2;
        }

        /* Projects Section */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .project-card {
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6, #10b981, #8b5cf6);
            background-size: 300% 100%;
            animation: gradientMove 3s linear infinite;
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .project-card:hover::before {
            transform: translateX(100%);
        }

        .project-card:hover {
            transform: translateY(-15px) rotateX(2deg);
            border-color: #8b5cf6;
            box-shadow: 
                0 30px 50px -20px rgba(139, 92, 246, 0.5),
                0 0 0 1px rgba(139, 92, 246, 0.3);
        }

        /* Project Image */
        .project-image {
            height: 220px;
            overflow: hidden;
            position: relative;
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .project-card:hover .project-image img {
            transform: scale(1.1);
        }

        .project-overlay {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 2;
        }

        .project-category {
            padding: 0.4rem 1.2rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border-radius: 50px;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
        }

        .project-content {
            padding: 2rem;
        }

        .project-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .project-desc {
            color: #cbd5e1;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tech-tag {
            padding: 0.3rem 1rem;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 30px;
            font-size: 0.8rem;
            color: #a78bfa;
            transition: all 0.3s ease;
        }

        .tech-tag:hover {
            background: #8b5cf6;
            color: white;
            border-color: #8b5cf6;
            transform: translateY(-2px);
        }

        .project-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 0.5rem 0;
            position: relative;
        }

        .project-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            transition: width 0.3s ease;
        }

        .project-link:hover {
            color: white;
        }

        .project-link:hover::after {
            width: 100%;
        }

        .project-link i {
            color: #8b5cf6;
            transition: transform 0.3s ease;
        }

        .project-link:hover i {
            transform: translateX(5px);
        }

        /* View More Button */
        .view-more {
            text-align: center;
            margin-top: 4rem;
        }

        .btn-view-more {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-view-more::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-view-more:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-view-more:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.5);
        }

        .btn-view-more i {
            transition: transform 0.3s ease;
        }

        .btn-view-more:hover i {
            transform: translateX(5px);
        }

        /* Modal for Certificate Preview */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(139, 92, 246, 0.4);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10000;
        }

        .modal-close:hover {
            background: #ef4444;
            transform: rotate(90deg);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .section-header h2 {
                font-size: 2.5rem;
            }
            
            .cert-grid,
            .project-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-container {
                gap: 1rem;
            }
            
            .stat-item {
                padding: 1rem;
                min-width: 140px;
            }
            
            .stat-number {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            
            .section-header h2 {
                font-size: 2rem;
            }
            
            .filter-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-btn {
                text-align: center;
            }
        }

        /* Loading Animation */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0f1e;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .loading.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            position: relative;
        }

        .loading-spinner::before,
        .loading-spinner::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: #8b5cf6;
            animation: spin 1s linear infinite;
        }

        .loading-spinner::after {
            border-top-color: #3b82f6;
            animation: spin 1.5s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Animation -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <!-- Particles Background -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Stats Counter -->
        <div class="stats-container" data-aos="fade-up">
            <div class="stat-item">
                <span class="stat-number" id="certCount">28</span>
                <span class="stat-label">Certificates</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="projectCount">6</span>
                <span class="stat-label">Projects</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="issuerCount">12</span>
                <span class="stat-label">Organizations</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="techCount">15</span>
                <span class="stat-label">Technologies</span>
            </div>
        </div>

        <!-- Certificates Section -->
        <div class="section-header" data-aos="fade-up" data-aos-delay="100">
            <h2>📜 Professional Certificates</h2>
            <p><i class="fas fa-certificate"></i> 28+ credentials from global organizations <i class="fas fa-certificate"></i></p>
        </div>

        <!-- Certificate Filters -->
        <div class="filter-container" data-aos="fade-up" data-aos-delay="150">
            <button class="filter-btn active" data-filter="all">All Certificates</button>
            <button class="filter-btn" data-filter="aws">AWS</button>
            <button class="filter-btn" data-filter="coursera">Coursera</button>
            <button class="filter-btn" data-filter="ibm">IBM</button>
            <button class="filter-btn" data-filter="govt">Government</button>
            <button class="filter-btn" data-filter="other">Other</button>
        </div>

        <!-- Certificates Grid -->
        <div class="cert-grid" id="certGrid" data-aos="fade-up" data-aos-delay="200"></div>

        <!-- Projects Section -->
        <div class="section-header" style="margin-top: 6rem;" data-aos="fade-up">
            <h2>💻 Featured Projects</h2>
            <p><i class="fas fa-code"></i> Real‑world builds • AI • Web • Systems <i class="fas fa-code"></i></p>
        </div>

        <!-- Project Filters -->
        <div class="filter-container" data-aos="fade-up" data-aos-delay="100">
            <button class="filter-btn active" data-project-filter="all">All Projects</button>
            <button class="filter-btn" data-project-filter="python">Python</button>
            <button class="filter-btn" data-project-filter="cpp">C++</button>
            <button class="filter-btn" data-project-filter="web">Web</button>
            <button class="filter-btn" data-project-filter="ai">AI/ML</button>
        </div>

        <!-- Projects Grid -->
        <div class="project-grid" id="projectGrid" data-aos="fade-up" data-aos-delay="200"></div>

        <!-- View More Button -->
        <div class="view-more" data-aos="fade-up">
            <a href="https://github.com/Sanjai-Gopal" target="_blank" class="btn-view-more">
                <span>View All on GitHub</span>

                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 5;
                const xMove = (Math.random() - 0.5) * 2;
                const yMove = (Math.random() - 0.5) * 2;
                
                particle.style.cssText = `
                    left: ${x}%;
                    top: ${y}%;
                    width: ${size}px;
                    height: ${size}px;
                    --x: ${xMove};
                    --y: ${yMove};
                    animation-duration: ${duration}s;
                    animation-delay: -${delay}s;

        // Modal functions

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('certModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Event Listeners for filters
        document.querySelectorAll('[data-filter]').forEach(btn => {

                document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderCertificates(this.dataset.filter);
            });
        });

        document.querySelectorAll('[data-project-filter]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-project-filter]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderProjects(this.dataset.projectFilter);
            });
        });

        // Modal close
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('certModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Escape key to close modal
