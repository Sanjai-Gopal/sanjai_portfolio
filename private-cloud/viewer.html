<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D File Viewer - Sanjai Cloud</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }
        
        #viewer-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .viewer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .viewer-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .viewer-title h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .back-btn {
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 30px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
        }
        
        .viewer-controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: #8b5cf6;
            border-color: #8b5cf6;
            transform: scale(1.1);
        }
        
        .file-info-panel {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            z-index: 2;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            max-width: 300px;
        }
        
        .file-info-panel h3 {
            margin-bottom: 1rem;
            color: #8b5cf6;
        }
        
        .file-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        
        .file-info-item span.value {
            color: white;
            font-weight: 600;
        }
        
        .thumbnail-grid {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            gap: 1rem;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            padding: 0.5rem;
        }
        
        .thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: #1e293b;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .thumbnail:hover {
            transform: translateY(-5px);
        }
        
        .thumbnail.active {
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
        
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .loading-spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            display: none;
        }
        
        .loading-spinner.active {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .thumbnail-grid { display: none; }
            .file-info-panel { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div id="viewer-container"></div>
    
    <!-- Loading Spinner -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p>Loading 3D scene...</p>
    </div>
    
    <!-- Top Overlay -->
    <div class="viewer-overlay">
        <div class="viewer-title">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Cloud
            </a>
            <h1><i class="fas fa-cube" style="color: #8b5cf6;"></i> 3D File Viewer</h1>
        </div>
        <div>
            <button class="control-btn" onclick="toggleFullscreen()" title="Fullscreen">
                <i class="fas fa-expand"></i>
            </button>
        </div>
    </div>
    
    <!-- File Info Panel -->
    <div class="file-info-panel" id="fileInfoPanel">
        <h3><i class="fas fa-info-circle"></i> Current File</h3>
        <div class="file-info-item">
            <span>Name:</span>
            <span class="value" id="fileName">Certificate_3D.obj</span>
        </div>
        <div class="file-info-item">
            <span>Type:</span>
            <span class="value" id="fileType">3D Model</span>
        </div>
        <div class="file-info-item">
            <span>Size:</span>
            <span class="value" id="fileSize">2.4 MB</span>
        </div>
        <div class="file-info-item">
            <span>Uploaded:</span>
            <span class="value" id="fileDate">Mar 1, 2026</span>
        </div>
        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
            <button class="control-btn" style="width: auto; padding: 0 1rem; border-radius: 30px;" onclick="rotateModel()">
                <i class="fas fa-sync-alt"></i> Rotate
            </button>
            <button class="control-btn" style="width: auto; padding: 0 1rem; border-radius: 30px;" onclick="resetView()">
                <i class="fas fa-home"></i> Reset
            </button>
        </div>
    </div>
    
    <!-- Thumbnail Navigation -->
    <div class="thumbnail-grid">
        <div class="thumbnail active" onclick="loadModel('cert1')">
            <img src="../assets/images/achievements/certificates/python-cert.jpg" alt="Certificate 1">
        </div>
        <div class="thumbnail" onclick="loadModel('cert2')">
            <img src="../assets/images/achievements/certificates/git-cert.jpg" alt="Certificate 2">
        </div>
        <div class="thumbnail" onclick="loadModel('cert3')">
            <div style="width:100%; height:100%; background: linear-gradient(135deg, #8b5cf6, #3b82f6); display: flex; align-items: center; justify-content: center; color: white;">
                <i class="fas fa-file-pdf"></i>
            </div>
        </div>
    </div>
    
    <!-- Right Controls -->
    <div class="viewer-controls">
        <button class="control-btn" onclick="zoomIn()" title="Zoom In">
            <i class="fas fa-search-plus"></i>
        </button>
        <button class="control-btn" onclick="zoomOut()" title="Zoom Out">
            <i class="fas fa-search-minus"></i>
        </button>
        <button class="control-btn" onclick="toggleWireframe()" title="Wireframe">
            <i class="fas fa-border-all"></i>
        </button>
        <button class="control-btn" onclick="takeScreenshot()" title="Screenshot">
            <i class="fas fa-camera"></i>
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // Initialize Three.js scene
        let scene, camera, renderer, controls, model;
        let isWireframe = false;
        
        function init() {
            showLoading();
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            
            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 10);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('viewer-container').appendChild(renderer.domElement);
            
            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2.0;
            controls.enableZoom = true;
            controls.maxPolarAngle = Math.PI / 2;
            
            // Lights
            // Ambient light
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            // Main directional light
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);
            
            // Fill lights
            const fillLight1 = new THREE.PointLight(0x8b5cf6, 0.5);
            fillLight1.position.set(-5, 0, 5);
            scene.add(fillLight1);
            
            const fillLight2 = new THREE.PointLight(0x3b82f6, 0.5);
            fillLight2.position.set(5, 0, -5);
            scene.add(fillLight2);
            
            // Background stars
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2000;
            const starsPositions = new Float32Array(starsCount * 3);
            
            for (let i = 0; i < starsCount * 3; i += 3) {
                starsPositions[i] = (Math.random() - 0.5) * 200;
                starsPositions[i+1] = (Math.random() - 0.5) * 200;
                starsPositions[i+2] = (Math.random() - 0.5) * 200;
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
            
            // Ground grid
            const gridHelper = new THREE.GridHelper(20, 20, 0x8b5cf6, 0x3b82f6);
            gridHelper.position.y = -1;
            scene.add(gridHelper);
            
            // Create default geometric model (since we don't have actual 3D models)
            createGeometricModel();
            
            hideLoading();
            animate();
        }
        
        function createGeometricModel() {
            // Create a group to hold multiple shapes
            model = new THREE.Group();
            
            // Central glowing sphere
            const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({
                color: 0x8b5cf6,
                emissive: 0x4c1d95,
                roughness: 0.2,
                metalness: 0.8
            });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            sphere.castShadow = true;
            sphere.receiveShadow = true;
            model.add(sphere);
            
            // Rotating rings
            const ringGeo = new THREE.TorusGeometry(1.5, 0.05, 16, 100);
            const ringMat = new THREE.MeshStandardMaterial({
                color: 0x3b82f6,
                emissive: 0x1e3a8a,
                transparent: true,
                opacity: 0.6
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.rotation.z = Math.PI / 4;
            model.add(ring);
            
            const ring2 = ring.clone();
            ring2.material = ringMat.clone();
            ring2.material.color.setHex(0x06b6d4);
            ring2.scale.set(1.2, 1.2, 1.2);
            ring2.rotation.x = Math.PI / 3;
            ring2.rotation.y = Math.PI / 6;
            model.add(ring2);
            
            // Floating cubes around the sphere
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const radius = 2.5;
                
                const cubeGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
                const cubeMat = new THREE.MeshStandardMaterial({
                    color: 0xf59e0b,
                    emissive: 0x92400e
                });
                const cube = new THREE.Mesh(cubeGeo, cubeMat);
                
                cube.position.x = Math.cos(angle) * radius;
                cube.position.z = Math.sin(angle) * radius;
                cube.position.y = Math.sin(angle * 2) * 0.5;
                
                cube.castShadow = true;
                cube.receiveShadow = true;
                model.add(cube);
            }
            
            scene.add(model);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate stars slowly
            scene.children.forEach(child => {
                if (child.isPoints) {
                    child.rotation.y += 0.0001;
                }
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        function zoomIn() {
            camera.position.multiplyScalar(0.9);
        }
        
        function zoomOut() {
            camera.position.multiplyScalar(1.1);
        }
        
        function toggleWireframe() {
            isWireframe = !isWireframe;
            scene.traverse(object => {
                if (object.isMesh) {
                    object.material.wireframe = isWireframe;
                }
            });
        }
        
        function rotateModel() {
            controls.autoRotate = !controls.autoRotate;
        }
        
        function resetView() {
            camera.position.set(5, 5, 10);
            controls.target.set(0, 0, 0);
            controls.update();
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
        function takeScreenshot() {
            renderer.render(scene, camera);
            const dataURL = renderer.domElement.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = '3d-view-screenshot.png';
            link.href = dataURL;
            link.click();
        }
        
        function loadModel(modelId) {
            showLoading();
            
            // Update active thumbnail
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Simulate loading different models
            setTimeout(() => {
                // Remove old model
                if (model) scene.remove(model);
                
                // Create new model with different colors based on selection
                const colors = {
                    cert1: [0x8b5cf6, 0x3b82f6, 0xf59e0b],
                    cert2: [0xec4899, 0x8b5cf6, 0x06b6d4],
                    cert3: [0x10b981, 0x3b82f6, 0xf59e0b]
                };
                
                const colorSet = colors[modelId] || colors.cert1;
                
                model = new THREE.Group();
                
                // Create different arrangement based on ID
                const count = modelId === 'cert1' ? 12 : modelId === 'cert2' ? 16 : 20;
                
                for (let i = 0; i < count; i++) {
                    const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                    const material = new THREE.MeshStandardMaterial({
                        color: colorSet[i % colorSet.length],
                        emissive: 0x222222
                    });
                    const cube = new THREE.Mesh(geometry, material);
                    
                    const angle = (i / count) * Math.PI * 2;
                    const radius = 2;
                    const height = Math.sin(angle * 3) * 1.5;
                    
                    cube.position.x = Math.cos(angle) * radius;
                    cube.position.z = Math.sin(angle) * radius;
                    cube.position.y = height;
                    
                    cube.castShadow = true;
                    cube.receiveShadow = true;
                    model.add(cube);
                }
                
                scene.add(model);
                
                // Update file info
                const names = {
                    cert1: 'Python_Certificate.obj',
                    cert2: 'Git_Certificate.obj',
                    cert3: 'Project_Report.obj'
                };
                
                const sizes = {
                    cert1: '2.4 MB',
                    cert2: '1.8 MB',
                    cert3: '3.2 MB'
                };
                
                const dates = {
                    cert1: 'Mar 1, 2026',
                    cert2: 'Feb 15, 2026',
                    cert3: 'Jan 10, 2026'
                };
                
                document.getElementById('fileName').textContent = names[modelId];
                document.getElementById('fileSize').textContent = sizes[modelId];
                document.getElementById('fileDate').textContent = dates[modelId];
                
                hideLoading();
            }, 1000);
        }
        
        function showLoading() {
            document.getElementById('loadingSpinner').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loadingSpinner').classList.remove('active');
        }
        
        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Initialize when page loads
        window.onload = init;
    </script>
</body>
</html>
