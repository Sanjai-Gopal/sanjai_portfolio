<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starred Files - Sanjai Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e, #141b2b);
            color: #fff;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 2rem;
            color: #f59e0b;
        }

        .back-btn {
            padding: 0.75rem 1.5rem;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #f59e0b;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #f59e0b;
            transform: translateY(-2px);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f59e0b;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .file-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .file-card:hover {
            transform: translateY(-5px);
            border-color: #f59e0b;
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.2);
        }

        .star-icon {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: #f59e0b;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .star-icon:hover {
            transform: scale(1.2);
        }

        .file-icon {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .file-icon.pdf { color: #ef4444; }
        .file-icon.image { color: #10b981; }
        .file-icon.doc { color: #3b82f6; }

        .file-name {
            font-size: 1rem;
            text-align: center;
            word-break: break-word;
            margin-bottom: 0.5rem;
        }

        .file-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .preview-btn {
            background: #8b5cf6;
            color: white;
        }

        .download-btn {
            background: #3b82f6;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
            margin-top: 2rem;
        }

        .empty-state i {
            font-size: 5rem;
            color: #f59e0b;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h2 {
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .stats-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-star"></i> Starred Files</h1>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Cloud</a>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="totalStarred">0</div>
                <div class="stat-label">Starred Files</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSize">0 MB</div>
                <div class="stat-label">Total Size</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="mostStarred">-</div>
                <div class="stat-label">Most Starred</div>
            </div>
        </div>

        <div id="filesContainer"></div>
    </div>

    <script>
        let starredFiles = [];

        function loadStarredFiles() {
            const allFiles = JSON.parse(localStorage.getItem('cloudFiles') || '[]');
            const starredIds = JSON.parse(localStorage.getItem('starredFiles') || '[]');
            
            starredFiles = allFiles.filter(file => starredIds.includes(file.id));
            
            updateStats();
            displayFiles();
        }

        function updateStats() {
            const total = starredFiles.length;
            const totalSize = starredFiles.reduce((sum, f) => sum + (f.size || 0), 0);
            
            document.getElementById('totalStarred').textContent = total;
            document.getElementById('totalSize').textContent = (totalSize / (1024 * 1024)).toFixed(1);
            
            // Find most common file type
            const types = {};
            starredFiles.forEach(f => {
                const ext = f.name.split('.').pop();
                types[ext] = (types[ext] || 0) + 1;
            });
            
            let mostCommon = Object.entries(types).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('mostStarred').textContent = mostCommon ? mostCommon[0].toUpperCase() : '-';
        }

        function displayFiles() {
            const container = document.getElementById('filesContainer');
            
            if (starredFiles.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-star"></i>
                        <h2>No starred files</h2>
                        <p>Star your important files to see them here</p>
                        <button class="back-btn" onclick="window.location.href='index.html'">
                            <i class="fas fa-cloud"></i> Browse Files
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="files-grid">
                    ${starredFiles.map(file => `
                        <div class="file-card" data-id="${file.id}">
                            <i class="fas fa-star star-icon" onclick="toggleStar('${file.id}')"></i>
                            <div class="file-icon ${getFileClass(file.type)}">
                                <i class="fas ${getFileIcon(file.type)}"></i>
                            </div>
                            <h4 class="file-name">${truncateName(file.name)}</h4>
                            <div class="file-meta">
                                <span>${formatSize(file.size)}</span>
                                <span>${new Date(file.uploadDate).toLocaleDateString()}</span>
                            </div>
                            <div class="file-actions">
                                <button class="action-btn preview-btn" onclick="previewFile('${file.id}')">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="action-btn download-btn" onclick="downloadFile('${file.id}')">
                                    <i class="fas fa-download"></i>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function getFileIcon(type) {
            if (type?.includes('pdf')) return 'fa-file-pdf';
            if (type?.includes('image')) return 'fa-file-image';
            if (type?.includes('word')) return 'fa-file-word';
            if (type?.includes('excel')) return 'fa-file-excel';
            return 'fa-file';
        }

        function getFileClass(type) {
            if (type?.includes('pdf')) return 'pdf';
            if (type?.includes('image')) return 'image';
            if (type?.includes('word')) return 'doc';
            return '';
        }

        function truncateName(name, max = 25) {
            if (name.length <= max) return name;
            return name.substr(0, max - 3) + '...';
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function toggleStar(id) {
            let starred = JSON.parse(localStorage.getItem('starredFiles') || '[]');
            starred = starred.filter(s => s !== id);
            localStorage.setItem('starredFiles', JSON.stringify(starred));
            
            starredFiles = starredFiles.filter(f => f.id !== id);
            displayFiles();
            updateStats();
            
            showNotification('Removed from starred', 'info');
        }

        function previewFile(id) {
            const file = starredFiles.find(f => f.id === id);
            if (file.type?.includes('pdf')) {
                window.open('#', '_blank');
            } else {
                window.open('#', '_blank');
            }
        }

        function downloadFile(id) {
            const file = starredFiles.find(f => f.id === id);
            showNotification(`Downloading ${file.name}`, 'success');
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 1rem 1.5rem;
                background: ${type === 'success' ? '#10b981' : '#f59e0b'};
                color: white;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                z-index: 9999;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => notification.remove(), 3000);
        }

        document.addEventListener('DOMContentLoaded', loadStarredFiles);
    </script>
</body>
</html>
