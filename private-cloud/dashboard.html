<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Sanjai Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e, #141b2b);
            color: #fff;
            min-height: 100vh;
            padding: 2rem;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            padding: 0.75rem 1.5rem;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #8b5cf6;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #8b5cf6;
            transform: translateY(-2px);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #8b5cf6;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-info h3 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }

        .stat-info p {
            color: #94a3b8;
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .chart-card h2 {
            margin-bottom: 1rem;
            font-size: 1.25rem;
            color: #8b5cf6;
        }

        canvas {
            max-height: 300px;
        }

        /* Activity Timeline */
        .timeline-section {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .timeline-section h2 {
            margin-bottom: 1.5rem;
            color: #8b5cf6;
        }

        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #8b5cf6, #3b82f6);
        }

        .timeline-item {
            position: relative;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(20, 30, 50, 0.5);
            border-radius: 10px;
            margin-left: 1rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -1.5rem;
            top: 1.5rem;
            width: 1rem;
            height: 1rem;
            background: #8b5cf6;
            border-radius: 50%;
        }

        .timeline-time {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .timeline-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .timeline-desc {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        /* Storage Details */
        .storage-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .storage-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 10px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .storage-item .label {
            color: #94a3b8;
        }

        .storage-item .value {
            font-weight: 600;
            color: #8b5cf6;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Analytics Dashboard</h1>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Cloud</a>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-file"></i></div>
                <div class="stat-info">
                    <h3 id="totalFiles">0</h3>
                    <p>Total Files</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-file-pdf"></i></div>
                <div class="stat-info">
                    <h3 id="pdfCount">0</h3>
                    <p>PDF Documents</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-image"></i></div>
                <div class="stat-info">
                    <h3 id="imageCount">0</h3>
                    <p>Images</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-database"></i></div>
                <div class="stat-info">
                    <h3 id="totalSize">0 MB</h3>
                    <p>Storage Used</p>
                </div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="charts-grid">
            <div class="chart-card">
                <h2><i class="fas fa-chart-pie"></i> Storage Distribution</h2>
                <canvas id="storageChart"></canvas>
            </div>
            <div class="chart-card">
                <h2><i class="fas fa-chart-bar"></i> File Types</h2>
                <canvas id="fileTypeChart"></canvas>
            </div>
        </div>

        <!-- Activity Timeline -->
        <div class="timeline-section">
            <h2><i class="fas fa-history"></i> Recent Activity</h2>
            <div class="timeline" id="timeline"></div>
        </div>

        <!-- Storage Details -->
        <div class="storage-details">
            <div class="storage-item">
                <span class="label"><i class="fas fa-cloud-upload-alt"></i> Used Space</span>
                <span class="value" id="usedSpace">0 MB</span>
            </div>
            <div class="storage-item">
                <span class="label"><i class="fas fa-cloud"></i> Free Space</span>
                <span class="value" id="freeSpace">1 GB</span>
            </div>
            <div class="storage-item">
                <span class="label"><i class="fas fa-percent"></i> Usage</span>
                <span class="value" id="usagePercent">0%</span>
            </div>
            <div class="storage-item">
                <span class="label"><i class="fas fa-calendar"></i> Last Backup</span>
                <span class="value" id="lastBackup">Never</span>
            </div>
        </div>
    </div>

    <script>
        // Load data from localStorage
        let files = [];
        let activities = [];

        function loadData() {
            const saved = localStorage.getItem('cloudFiles');
            if (saved) {
                files = JSON.parse(saved);
            }

            const savedActivities = localStorage.getItem('cloudActivities');
            if (savedActivities) {
                activities = JSON.parse(savedActivities);
            } else {
                // Generate sample activities
                activities = [
                    {
                        time: new Date(Date.now() - 3600000).toISOString(),
                        title: 'File Uploaded',
                        description: 'project-report.pdf (2.5 MB)'
                    },
                    {
                        time: new Date(Date.now() - 7200000).toISOString(),
                        title: 'File Shared',
                        description: 'certificate.jpg shared via link'
                    },
                    {
                        time: new Date(Date.now() - 86400000).toISOString(),
                        title: 'File Downloaded',
                        description: 'resume.pdf was downloaded'
                    },
                    {
                        time: new Date(Date.now() - 172800000).toISOString(),
                        title: 'File Deleted',
                        description: 'old-document.pdf moved to trash'
                    }
                ];
            }

            updateStats();
            updateCharts();
            updateTimeline();
        }

        function updateStats() {
            const totalFiles = files.length;
            const pdfCount = files.filter(f => f.type?.includes('pdf')).length;
            const imageCount = files.filter(f => f.type?.includes('image')).length;
            const totalSize = files.reduce((sum, f) => sum + (f.size || 0), 0);
            const storageLimit = 1024 * 1024 * 1024; // 1GB
            const freeSpace = storageLimit - totalSize;
            const usagePercent = (totalSize / storageLimit) * 100;

            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('pdfCount').textContent = pdfCount;
            document.getElementById('imageCount').textContent = imageCount;
            document.getElementById('totalSize').textContent = (totalSize / (1024 * 1024)).toFixed(1) + ' MB';
            document.getElementById('usedSpace').textContent = (totalSize / (1024 * 1024)).toFixed(1) + ' MB';
            document.getElementById('freeSpace').textContent = (freeSpace / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
            document.getElementById('usagePercent').textContent = usagePercent.toFixed(1) + '%';
            document.getElementById('lastBackup').textContent = new Date().toLocaleDateString();
        }

        function updateCharts() {
            // Storage Chart
            const totalSize = files.reduce((sum, f) => sum + (f.size || 0), 0);
            const storageLimit = 1024 * 1024 * 1024;
            
            new Chart(document.getElementById('storageChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Used', 'Free'],
                    datasets: [{
                        data: [totalSize, storageLimit - totalSize],
                        backgroundColor: ['#8b5cf6', '#334155'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    }
                }
            });

            // File Type Chart
            const pdfCount = files.filter(f => f.type?.includes('pdf')).length;
            const imageCount = files.filter(f => f.type?.includes('image')).length;
            const otherCount = files.length - pdfCount - imageCount;

            new Chart(document.getElementById('fileTypeChart'), {
                type: 'bar',
                data: {
                    labels: ['PDF', 'Images', 'Other'],
                    datasets: [{
                        data: [pdfCount, imageCount, otherCount],
                        backgroundColor: ['#ef4444', '#10b981', '#3b82f6'],
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#fff' }
                        },
                        x: {
                            ticks: { color: '#fff' }
                        }
                    }
                }
            });
        }

        function updateTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = activities.sort((a, b) => 
                new Date(b.time) - new Date(a.time)
            ).map(activity => `
                <div class="timeline-item">
                    <div class="timeline-time">${new Date(activity.time).toLocaleString()}</div>
                    <div class="timeline-title">${activity.title}</div>
                    <div class="timeline-desc">${activity.description}</div>
                </div>
            `).join('');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
