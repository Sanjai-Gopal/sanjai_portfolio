<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjai's Blog - AI & Programming Insights</title>
    
    <!-- SEO Meta -->
    <meta name="description" content="Read Sanjai Gopal's blog about AI, Machine Learning, Python, C++, and technology insights from a first-year engineering student at SKCET, Coimbatore.">
    <meta name="keywords" content="AI blog, Machine Learning, Python tutorials, C++ programming, MLOps, SKCET, Coimbatore">
    <meta name="author" content="Sanjai Gopal">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Sanjai's Blog - AI & Programming Insights">
    <meta property="og:description" content="Thoughts and tutorials on AI, ML, and programming from a first-year engineering student.">
    <meta property="og:image" content="https://sanjai-gopal.github.io/sanjai_portfolio/assets/images/blog/blog-header.jpg">
    <meta property="og:url" content="https://sanjai-gopal.github.io/sanjai_portfolio/blog/">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* Blog Specific Styles */
        .blog-header {
            padding: 150px 0 50px;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            text-align: center;
        }
        
        .blog-title {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        
        .blog-subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 600px;
            margin: 0 auto 3rem;
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            padding: 4rem 0;
        }
        
        .blog-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .blog-card:hover {
            transform: translateY(-10px);
            border-color: #8b5cf6;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }
        
        .blog-image {
            height: 200px;
            overflow: hidden;
            position: relative;
        }
        
        .blog-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .blog-card:hover .blog-image img {
            transform: scale(1.1);
        }
        
        .blog-category {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.3rem 1rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 2;
        }
        
        .blog-content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .blog-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        
        .blog-meta i {
            margin-right: 0.3rem;
            color: #8b5cf6;
        }
        
        .blog-content h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            line-height: 1.4;
            color: white;
        }
        
        .blog-excerpt {
            color: #cbd5e1;
            margin-bottom: 1rem;
            line-height: 1.6;
            flex: 1;
        }
        
        .blog-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .blog-tag {
            padding: 0.2rem 0.8rem;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        .blog-read-more {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #8b5cf6;
            font-weight: 600;
            text-decoration: none;
            transition: gap 0.3s ease;
            margin-top: auto;
        }
        
        .blog-read-more:hover {
            gap: 1rem;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 3rem 0;
        }
        
        .page-btn {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            background: rgba(30, 41, 59, 0.8);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover,
        .page-btn.active {
            background: #8b5cf6;
            border-color: #8b5cf6;
        }
        
        .page-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .newsletter-section {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 4rem 0;
            text-align: center;
            border-radius: 20px;
            margin: 2rem 0;
        }
        
        .newsletter-form {
            max-width: 500px;
            margin: 2rem auto 0;
            display: flex;
            gap: 1rem;
        }
        
        .newsletter-form input {
            flex: 1;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            color: white;
        }
        
        .newsletter-form input:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        
        .newsletter-form button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .newsletter-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
        
        @media (max-width: 768px) {
            .blog-title { font-size: 2.5rem; }
            .blog-grid { grid-template-columns: 1fr; }
            .newsletter-form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="../index.html" class="logo-link">
                    <span class="logo-text">S</span>
                    <span class="logo-full">ANJAI</span>
                    <span class="logo-dot">.</span>
                </a>
            </div>
            
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#about">About</a></li>
                <li><a href="../index.html#skills">Skills</a></li>
                <li><a href="../projects/index.html">Projects</a></li>
                <li><a href="index.html" class="active">Blog</a></li>
                <li><a href="../index.html#contact">Contact</a></li>
            </ul>
            
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="../private-cloud/index.html" class="cloud-btn">
                    <i class="fas fa-cloud"></i>
                </a>
                <button class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Blog Header -->
    <header class="blog-header">
        <div class="container">
            <h1 class="blog-title">My <span class="gradient-text">Blog</span></h1>
            <p class="blog-subtitle">Thoughts, tutorials, and insights about AI, programming, and my journey at SKCET</p>
        </div>
    </header>

    <!-- Blog Grid -->
    <section class="container">
        <div class="blog-grid" id="blogGrid">
            <!-- Blog posts will be loaded here -->
        </div>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <button class="page-btn disabled"><i class="fas fa-chevron-left"></i></button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
        </div>
    </section>

    <!-- Newsletter Section -->
    <section class="container">
        <div class="newsletter-section">
            <h2>Stay Updated</h2>
            <p>Get notified when I publish new articles</p>
            <form class="newsletter-form" id="newsletterForm">
                <input type="email" placeholder="Your email address" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Sanjai Gopal. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // Blog posts data
        const blogPosts = [
            {
                id: 1,
                title: "Getting Started with Python: A Beginner's Guide",
                excerpt: "Learn the fundamentals of Python programming with practical examples and tips for aspiring AI engineers at SKCET.",
                date: "2026-03-01",
                category: "Programming",
                tags: ["Python", "Beginners", "Tutorial"],
                image: "../assets/images/blog/python-basics.jpg",
                readTime: 5,
                slug: "post1.html"
            },
            {
                id: 2,
                title: "Git & GitHub: Essential Commands Every Developer Should Know",
                excerpt: "A comprehensive guide to version control for beginners, with practical workflows and tips from my experience.",
                date: "2026-02-15",
                category: "DevOps",
                tags: ["Git", "GitHub", "Version Control"],
                image: "../assets/images/blog/git-guide.jpg",
                readTime: 7,
                slug: "post2.html"
            },
            {
                id: 3,
                title: "My First Steps into AI: What I Learned in 3 Months at SKCET",
                excerpt: "Sharing my journey as a first-year AI student diving into the world of Machine Learning and Artificial Intelligence.",
                date: "2026-02-01",
                category: "AI/ML",
                tags: ["AI", "Machine Learning", "Student Life"],
                image: "../assets/images/blog/ai-journey.jpg",
                readTime: 6,
                slug: "post3.html"
            },
            {
                id: 4,
                title: "Understanding Neural Networks: A Beginner's Visual Guide",
                excerpt: "Demystifying neural networks with visual explanations and simple analogies for better understanding.",
                date: "2026-01-20",
                category: "AI/ML",
                tags: ["Neural Networks", "Deep Learning"],
                image: "../assets/images/blog/neural-networks.jpg",
                readTime: 8,
                slug: "post4.html"
            },
            {
                id: 5,
                title: "Building Your First C++ Project: Student Management System",
                excerpt: "Step-by-step guide to creating a practical C++ application from scratch with file handling.",
                date: "2026-01-05",
                category: "Programming",
                tags: ["C++", "Projects"],
                image: "../assets/images/blog/cpp-project.jpg",
                readTime: 6,
                slug: "post5.html"
            },
            {
                id: 6,
                title: "Introduction to MLOps: Bridging ML and Operations",
                excerpt: "Understanding the basics of MLOps and why it matters for production ML systems.",
                date: "2025-12-10",
                category: "MLOps",
                tags: ["MLOps", "DevOps"],
                image: "../assets/images/blog/mlops-intro.jpg",
                readTime: 7,
                slug: "post6.html"
            }
        ];

        // Display blog posts
        function displayPosts(posts) {
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = posts.map(post => `
                <article class="blog-card" data-aos="fade-up">
                    <div class="blog-image">
                        <img src="${post.image}" alt="${post.title}" onerror="this.src='../assets/images/blog/placeholder.jpg'">
                        <span class="blog-category">${post.category}</span>
                    </div>
                    <div class="blog-content">
                        <div class="blog-meta">
                            <span><i class="far fa-calendar"></i> ${new Date(post.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                            <span><i class="far fa-clock"></i> ${post.readTime} min read</span>
                        </div>
                        <h3>${post.title}</h3>
                        <p class="blog-excerpt">${post.excerpt}</p>
                        <div class="blog-tags">
                            ${post.tags.map(tag => `<span class="blog-tag">${tag}</span>`).join('')}
                        </div>
                        <a href="${post.slug}" class="blog-read-more">
                            Read Article <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                </article>
            `).join('');
        }

        // Initialize
        displayPosts(blogPosts);

        // Newsletter form
        document.getElementById('newsletterForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you for subscribing! You will receive updates about new blog posts.');
            this.reset();
        });

        // Theme toggle
        document.getElementById('themeToggle')?.addEventListener('click', function() {
            document.body.classList.toggle('light-theme');
            this.querySelector('i').classList.toggle('fa-moon');
            this.querySelector('i').classList.toggle('fa-sun');
        });

        // Mobile menu
        document.getElementById('hamburger')?.addEventListener('click', function() {
            document.querySelector('.nav-menu').classList.toggle('active');
            this.classList.toggle('active');
        });
    </script>
</body>
</html>
